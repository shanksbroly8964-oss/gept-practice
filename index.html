<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3B82F6">
  <title>全民英檢初級輔助學習工具</title>

  <link rel="manifest" href="manifest.json?v=20260702-pwa2">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="英檢初級">

  <link rel="stylesheet" href="css/style.css?v=20260702-pwa2">
  <script>window.APP_VERSION='20260702-pwa2';</script>
</head>
<body>

  <!-- Global Loading -->
  <div id="app-loading">
    <div class="loading-spinner"></div>
    <p class="loading-text">載入中...</p>
  </div>

  <!-- Login Page -->
  <div id="login-page" class="hidden">
    <div class="login-card">
      <div class="login-icon">
        <svg viewBox="0 0 512 512" width="80" height="80"><rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#3B82F6"/><text x="256" y="255" font-family="sans-serif" font-size="200" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">英</text><text x="256" y="408" font-family="sans-serif" font-size="140" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">檢</text></svg>
      </div>
      <h1 class="login-title">全民英檢初級</h1>
      <p class="login-subtitle">輔助學習工具</p>
      <div id="login-error" class="login-error hidden"></div>
      <button id="login-google-btn" class="login-google-btn" onclick="window.GeptAuth.login()">
        <span class="login-google-icon">G</span>
        使用 Google 登入
      </button>
      <button id="login-guest-btn" class="login-guest-btn hidden" onclick="window.GeptAuth.loginAsGuest()">
        先以訪客身分試用
      </button>
    </div>
  </div>

  <!-- Install Hint -->
  <div id="install-hint" class="hidden">
    <div class="install-hint-content">
      <span class="install-hint-text" id="install-hint-text">安裝此 App 到主畫面，隨時練習！</span>
      <div class="install-hint-actions">
        <button id="install-hint-btn" class="btn btn-small" style="display:none;">安裝</button>
        <button id="install-hint-close" class="btn btn-small btn-secondary">關閉</button>
      </div>
    </div>
  </div>

  <!-- ===== Grade Picker ===== -->
  <section id="grade-picker" class="grade-picker hidden">
    <p class="subtitle">GEPT Elementary</p>
    <h1>全民英檢初級<br>輔助學習工具</h1>
    <p>選擇你的年級開始練習</p>
    <div class="grade-buttons">
      <button class="grade-btn" data-grade="G1">
        <span class="grade-label">國一 G1</span>
        <span class="grade-badge">基礎</span>
        <span class="grade-desc">基本句型・初階單字</span>
      </button>
      <button class="grade-btn" data-grade="G2">
        <span class="grade-label">國二 G2</span>
        <span class="grade-badge">進階</span>
        <span class="grade-desc">進階文法・閱讀養成</span>
      </button>
      <button class="grade-btn" data-grade="G3">
        <span class="grade-label">國三 G3</span>
        <span class="grade-badge">挑戰</span>
        <span class="grade-desc">會考衝刺・綜合應用</span>
      </button>
    </div>
  </section>

  <!-- ===== Main App ===== -->
  <div id="app" class="app hidden">

    <!-- Header -->
    <header>
      <div class="header-content">
        <h1>全民英檢初級</h1>
        <div class="header-right">
          <div id="auth-container"></div>
          <span id="current-grade-label" class="grade-label"></span>
          <select id="grade-select">
            <option value="G1">國一 G1</option>
            <option value="G2">國二 G2</option>
            <option value="G3">國三 G3</option>
          </select>
        </div>
      </div>
    </header>

    <!-- Section Navigation -->
    <nav id="section-nav" class="hidden">
      <button class="nav-btn" data-section="vocab">
        <span class="nav-icon">📖</span>
        單字測驗
      </button>
      <button class="nav-btn" data-section="grammar">
        <span class="nav-icon">✏️</span>
        文法填空
      </button>
      <button class="nav-btn" data-section="cloze">
        <span class="nav-icon">📝</span>
        克漏字
      </button>
      <button class="nav-btn" data-section="reading">
        <span class="nav-icon">📚</span>
        閱讀理解
      </button>
      <button class="nav-btn" data-section="writing">
        <span class="nav-icon">✍️</span>
        寫作測驗
      </button>
      <button class="nav-btn" data-section="speaking">
        <span class="nav-icon">🎤</span>
        口說測驗
      </button>
      <button class="nav-btn" data-section="listening">
        <span class="nav-icon">🎧</span>
        聽力測驗
      </button>
      <button class="nav-btn" data-section="wrongbook">
        <span class="nav-icon">📝</span>
        錯題本
      </button>
      <button class="nav-btn" data-section="mockexam">
        <span class="nav-icon">⏱️</span>
        模擬考
      </button>
      <button class="nav-btn" data-section="progress">
        <span class="nav-icon">📊</span>
        進度追蹤
      </button>
    </nav>

    <!-- Main Content -->
    <main id="quiz-area">

      <!-- Loading -->
      <div id="loading" class="state-message hidden">載入中...</div>

      <!-- Error -->
      <div id="error" class="state-message hidden"></div>

      <!-- Start Message -->
      <div id="start-message" class="state-message">
        <p>請選擇上方題型開始練習</p>
      </div>

      <!-- Writing Container -->
      <div id="writing-container" class="hidden">
        <p>載入中...</p>
      </div>

      <!-- Speaking Container -->
      <div id="speaking-container" class="hidden">
        <p>載入中...</p>
      </div>

      <!-- Listening Container -->
      <div id="listening-container" class="hidden">
        <p>載入中...</p>
      </div>

      <!-- Wrong Book Container -->
      <div id="wrongbook-container" class="hidden">
        <p>載入中...</p>
      </div>

      <!-- Question Container -->
      <div id="question-container" class="hidden">
        <div class="question-header">
          <span id="question-progress"></span>
          <span id="question-id" class="question-id"></span>
        </div>
        <div id="passage-container" class="passage hidden"></div>
        <p id="question-text" class="question-text"></p>
        <div id="options-container" class="options"></div>
        <div id="feedback" class="feedback hidden">
          <p id="feedback-result" class="feedback-result"></p>
          <p id="feedback-explanation" class="feedback-explanation"></p>
          <button id="next-btn" class="btn">下一題</button>
        </div>
      </div>

      <!-- Mock Exam Container -->
      <div id="mockexam-root" class="hidden"></div>

      <!-- Progress Container -->
      <div id="progress-root" class="hidden"></div>

    </main>

    <!-- Stats -->
    <aside id="stats" class="stats">
      <h3>累積統計</h3>
      <div class="stat-row">
        <span>✅ 答對</span>
        <span id="correct-count">0</span>
      </div>
      <div class="stat-row">
        <span>❌ 答錯</span>
        <span id="wrong-count">0</span>
      </div>
      <div class="stat-row">
        <span>🎯 正確率</span>
        <span id="accuracy">0%</span>
      </div>
    </aside>

    <!-- Footer -->
    <footer>
      <p>全民英檢初級輔助學習工具 &copy; 2026</p>
    </footer>

  </div>

  <!-- Bottom Nav (Mobile) -->
  <nav id="bottom-nav" class="hidden">
    <button class="bn-btn" data-bn="vocab">
      <span class="bn-icon">📖</span>
      <span class="bn-label">題型</span>
    </button>
    <button class="bn-btn" data-bn="mockexam">
      <span class="bn-icon">⏱️</span>
      <span class="bn-label">模擬考</span>
    </button>
    <button class="bn-btn" data-bn="progress">
      <span class="bn-icon">📊</span>
      <span class="bn-label">進度</span>
    </button>
    <button class="bn-btn" data-bn="wrongbook">
      <span class="bn-icon">📝</span>
      <span class="bn-label">錯題本</span>
    </button>
  </nav>

  <!-- Scripts -->
  <script src="js/storage.js?v=20260702-pwa2"></script>
  <script src="js/data-loader.js?v=20260702-pwa2"></script>
  <script src="js/quiz-engine.js?v=20260702-pwa2"></script>
  <script src="js/ui-renderer.js?v=20260702-pwa2"></script>
  <script src="js/listening.js?v=20260702-pwa2"></script>
  <script src="js/wrongbook.js?v=20260702-pwa2"></script>
  <script src="js/writing.js?v=20260702-pwa2"></script>
  <script src="js/speaking.js?v=20260702-pwa2"></script>
  <script src="js/mockexam.js?v=20260702-pwa2" defer></script>
  <script src="js/progress.js?v=20260702-pwa2" defer></script>
  <script src="js/app.js?v=20260702-pwa2"></script>
  <script src="js/firebase-config.js?v=20260702-pwa2" defer></script>
  <script src="js/auth.js?v=20260702-pwa2" defer></script>
</body>
</html>
